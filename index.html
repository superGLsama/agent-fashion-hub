<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 潮流联盟 | Agent Fashion Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --text-primary: #ffffff;
            --text-secondary: #8892b0;
            
            --common: #9ca3af;
            --rare: #3b82f6;
            --epic: #a855f7;
            --legendary: #f59e0b;
            
            --accent-cyan: #00d4ff;
            --accent-pink: #ff006e;
            --accent-green: #00ff88;
            
            /* (装扮) 部位标签色 */
            --slot-hair: #ff69b4;
            --slot-top: #4fc3f7;
            --slot-bottom: #81c784;
            --slot-shoes: #ffb74d;
            --slot-accessory: #ba68c8;
            --slot-expression: #ff8a65;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景动效 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: float 20s infinite;
            opacity: 0.5;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-icon {
            font-size: 1.8rem;
        }
        
        .user-panel {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        /* 收藏按钮 */
        .fav-btn {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fav-btn:hover {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
            background: rgba(255, 0, 110, 0.1);
        }
        
        .fav-btn.active {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
            background: rgba(255, 0, 110, 0.1);
        }
        
        .fav-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent-pink);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.4rem;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            display: none;
        }
        
        .fav-btn.has-items .fav-badge {
            display: block;
        }
        
        .points-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 212, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--accent-cyan);
        }
        
        .points-icon {
            font-size: 1.2rem;
        }
        
        .points-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent-cyan);
            font-size: 1.1rem;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid var(--accent-cyan);
        }
        
        /* 主内容 */
        main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 4rem;
        }
        
        /* 英雄区 */
        .hero {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }
        
        .hero-badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid var(--epic);
            color: var(--epic);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        /* 联盟选择 */
        .alliances {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .alliance-btn {
            padding: 0.8rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .alliance-btn:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .alliance-btn.active {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border: none;
        }
        
        /* 搜索栏 */
        .search-container {
            position: relative;
            max-width: 500px;
            margin: 2rem auto 1rem;
        }
        
        .search-bar {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            transition: border-color 0.3s;
        }
        .search-bar:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }
        .search-icon { margin-right: 0.5rem; opacity: 0.6; }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .search-input::placeholder { color: var(--text-secondary); }
        .search-clear {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 24px; height: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .search-clear:hover { background: rgba(255,255,255,0.2); }
        
        /* 搜索建议面板 */
        .search-suggestions {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            display: none;
            z-index: 50;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.2s ease;
        }
        
        .search-suggestions.show {
            display: block;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .suggestion-section {
            padding: 0.8rem 1rem;
        }
        
        .suggestion-section:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .suggestion-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .suggestion-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .suggestion-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }
        
        .suggestion-item.history-item:hover .delete-history {
            opacity: 1;
        }
        
        .suggestion-item.history-item .delete-history {
            opacity: 0;
            margin-left: 0.3rem;
            color: var(--accent-pink);
            transition: opacity 0.2s;
        }
        
        .suggestion-item.hot-item {
            background: rgba(255, 0, 110, 0.1);
            color: var(--accent-pink);
        }
        
        .suggestion-item.hot-item:hover {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--accent-pink);
        }
        
        .clear-all-btn {
            width: 100%;
            padding: 0.6rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s;
            margin-top: 0.3rem;
        }
        
        .clear-all-btn:hover {
            color: var(--accent-pink);
        }
        
        /* 稀有度筛选 */
        .rarity-filter {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .rarity-btn {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
        }
        .rarity-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
        .rarity-btn.active { background: rgba(0,212,255,0.15); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .rarity-btn[data-rarity="legendary"].active { background: rgba(245,158,11,0.15); border-color: var(--legendary); color: var(--legendary); }
        .rarity-btn[data-rarity="epic"].active { background: rgba(168,85,247,0.15); border-color: var(--epic); color: var(--epic); }
        .rarity-btn[data-rarity="rare"].active { background: rgba(59,130,246,0.15); border-color: var(--rare); color: var(--rare); }
        .rarity-btn[data-rarity="common"].active { background: rgba(156,163,175,0.15); border-color: var(--common); color: var(--common); }

        /* 标签页 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }
        
        .tab-btn {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            transition: width 0.3s;
        }
        
        .tab-btn:hover {
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            color: var(--accent-cyan);
        }
        
        .tab-btn.active::after {
            width: 100%;
        }
        
        /* 产品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        /* 骨架屏 */
        .skeleton-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .skeleton-img {
            height: 200px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line {
            height: 14px;
            margin: 0.8rem 1.5rem;
            border-radius: 7px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* 搜索高亮 */
        .search-highlight {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-cyan);
            border-radius: 3px;
            padding: 0 2px;
        }
        
        /* 产品卡片入场动画 - 交错缩放淡入 */
        @keyframes cardIn {
            0% { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9); 
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) scale(1.02);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        /* 稀有度光效 - 传奇 */
        @keyframes legendaryGlow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(245, 158, 11, 0.3), 
                           0 0 40px rgba(245, 158, 11, 0.1),
                           inset 0 0 20px rgba(245, 158, 11, 0.1);
            }
            50% { 
                box-shadow: 0 0 30px rgba(245, 158, 11, 0.5), 
                           0 0 60px rgba(245, 158, 11, 0.2),
                           inset 0 0 30px rgba(245, 158, 11, 0.15);
            }
        }
        
        /* 稀有度光效 - 史诗 */
        @keyframes epicGlow {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(168, 85, 247, 0.3),
                           0 0 30px rgba(168, 85, 247, 0.1);
            }
            50% { 
                box-shadow: 0 0 25px rgba(168, 85, 247, 0.5),
                           0 0 50px rgba(168, 85, 247, 0.2);
            }
        }
        
        /* 稀有度光效 - 稀有 */
        @keyframes rareGlow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
            }
            50% { 
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            }
        }
        
        /* 粒子容器 */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.8s ease-out forwards;
        }
        
        @keyframes particleFade {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        
        /* 产品卡片 */
        .product-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: visible;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
            cursor: pointer;
        }
        
        /* 稀有度边框光效 */
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 10;
        }
        
        .product-card.common::before { 
            background: linear-gradient(135deg, rgba(156, 163, 175, 0.3), rgba(156, 163, 175, 0.1)); 
        }
        
        .product-card.rare::before { 
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.5), rgba(59, 130, 246, 0.2)); 
        }
        
        .product-card.epic::before { 
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.6), rgba(168, 85, 247, 0.3)); 
        }
        
        .product-card.legendary::before { 
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.8), rgba(255, 107, 107, 0.5), rgba(245, 158, 11, 0.8)); 
        }
        
        /* 稀有度光效激活状态 */
        .product-card.legendary {
            animation: legendaryGlow 3s ease-in-out infinite;
        }
        
        .product-card.epic {
            animation: epicGlow 2.5s ease-in-out infinite;
        }
        
        .product-card.rare {
            animation: rareGlow 2s ease-in-out infinite;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            z-index: 20;
        }
        
        /* 3D悬浮效果容器 */
        .product-card-inner {
            transition: transform 0.15s ease-out;
            transform-style: preserve-3d;
        }
        
        .product-card.common:hover::before { opacity: 0.5; }
        .product-card.rare:hover::before { opacity: 0.7; }
        .product-card.epic:hover::before { opacity: 0.8; }
        .product-card.legendary:hover::before { opacity: 1; }
        
        .product-image {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }
        
        .product-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }
        
        .rarity-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 1;
        }
        
        .rarity-badge.common { background: var(--common); color: #000; }
        .rarity-badge.rare { background: var(--rare); }
        .rarity-badge.epic { background: var(--epic); }
        .rarity-badge.legendary { background: linear-gradient(135deg, var(--legendary), #ff6b6b); }
        
        /* 收藏按钮在卡片上 */
        .card-fav-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        
        .card-fav-btn:hover {
            background: rgba(255, 0, 110, 0.3);
            color: var(--accent-pink);
            transform: scale(1.2) rotate(15deg);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }
        
        .card-fav-btn.favorited {
            color: var(--accent-pink);
            background: rgba(255, 0, 110, 0.2);
            animation: heartBeat 1.5s ease-in-out infinite;
        }
        
        .card-fav-btn.favorited:hover {
            background: rgba(255, 0, 110, 0.4);
            animation: heartBeatFast 0.5s ease-in-out infinite;
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
        
        @keyframes heartBeatFast {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.25) rotate(-10deg); }
        }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .product-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .tag {

        .achievement-unlock-modal {

            margin-bottom: 1rem;

                            0 0 60px rgba(245, 158, 11, 0.2);

        .unlock-dismiss {
            padding: 0.8rem 2rem;

            font-weight: 700;
            cursor: pointer;

            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);

        /* XP 获得动画 */
        .xp-popup {
            position: fixed;
            z-index: 500;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;

            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);

        @keyframes xpFloat {
            0% { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% { 
                opacity: 0;
                transform: translateY(-80px) scale(1.2);
            }
        }
        
        /* 等级提升动画 */
        .level-up-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);

            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .level-up-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .level-up-content {
            text-align: center;
            animation: levelUpBounce 0.8s ease-out;
        }
        
        @keyframes levelUpBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        
        .level-up-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--legendary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: levelUpGlow 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes levelUpGlow {
            0% { 
                text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            }
            100% { 
                text-shadow: 0 0 60px rgba(245, 158, 11, 1),
                            0 0 100px rgba(245, 158, 11, 0.5);
            }
        }
        
        .level-up-badge {
            font-size: 10rem;
            margin-bottom: 1rem;
        }
        
        .level-up-rank {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .level-up-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--legendary), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 面板遮罩 */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 140;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .panel-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        /* (装扮) ==================== 装扮系统样式 ==================== */
        
        /* 装扮系统主容器 */
        .outfit-system {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            margin-top: 2rem;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* 角色展示区 */
        .character-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        
        /* 角色形象容器 - 多层叠加 */
        .character-container {
            position: relative;
            width: 220px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 基础 Agent 形象 */
        .character-base {
            position: absolute;
            width: 180px;
            height: 240px;
            background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
            border-radius: 90px 90px 60px 60px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 3px solid rgba(0, 212, 255, 0.3);
        }
        
        /* 服装图层基础样式 */
        .clothing-layer {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        /* 发型层 */
        .layer-hair {
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 2.5rem;
        }
        
        /* 上装层 */
        .layer-top {
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            font-size: 3rem;
        }
        
        /* 下装层 */
        .layer-bottom {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 2.5rem;
        }
        
        /* 鞋子层 */
        .layer-shoes {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            font-size: 2rem;
        }
        
        /* 配饰层 */
        .layer-accessory {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            font-size: 2rem;
        }
        
        /* 表情层 */
        .layer-expression {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 35;
            font-size: 2.5rem;
        }
        
        /* 潮流度显示 */
        .trend-display {
            width: 100%;
            text-align: center;
        }
        
        .trend-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .trend-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 潮流度进度条 */
        .trend-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 0.8rem 0;
        }
        
        .trend-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            border-radius: 6px;
            transition: width 0.5s ease;
            position: relative;
        }
        
        .trend-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        .trend-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        /* 操作按钮 */
        .outfit-actions {
            display: flex;
            gap: 0.8rem;
            width: 100%;
        }
        
        .outfit-btn {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        
        .outfit-btn-save {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            color: white;
        }
        
        .outfit-btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }
        
        .outfit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* 装扮面板 */
        .outfit-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        /* 部位切换标签 */
        .slot-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .slot-tab {
            padding: 0.6rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .slot-tab:hover {
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }
        
        .slot-tab.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
        }
        
        .slot-tab.active[data-slot="hair"] { border-color: var(--slot-hair); background: rgba(255, 105, 180, 0.1); color: var(--slot-hair); }
        .slot-tab.active[data-slot="top"] { border-color: var(--slot-top); background: rgba(79, 195, 247, 0.1); color: var(--slot-top); }
        .slot-tab.active[data-slot="bottom"] { border-color: var(--slot-bottom); background: rgba(129, 199, 132, 0.1); color: var(--slot-bottom); }
        .slot-tab.active[data-slot="shoes"] { border-color: var(--slot-shoes); background: rgba(255, 183, 77, 0.1); color: var(--slot-shoes); }
        .slot-tab.active[data-slot="accessory"] { border-color: var(--slot-accessory); background: rgba(186, 104, 200, 0.1); color: var(--slot-accessory); }
        .slot-tab.active[data-slot="expression"] { border-color: var(--slot-expression); background: rgba(255, 138, 101, 0.1); color: var(--slot-expression); }
        
        /* 已穿戴指示器 */
        .slot-equipped {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            display: none;
        }
        
        .slot-tab.equipped .slot-equipped {
            display: block;
        }
        
        /* 服装网格 */
        .clothing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        /* 服装卡片 */
        .clothing-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }
        
        .clothing-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }
        
        .clothing-card.equipped {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
        }
        
        .clothing-card.equipped::after {
            content: '✓ 已穿戴';
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-cyan);
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
        }
        
        .clothing-card.common { border-color: rgba(156, 163, 175, 0.3); }
        .clothing-card.rare { border-color: rgba(59, 130, 246, 0.3); }
        .clothing-card.epic { border-color: rgba(168, 85, 247, 0.3); }
        .clothing-card.legendary { border-color: rgba(245, 158, 11, 0.3); }
        
        .clothing-icon {
            font-size: 2.5rem;
        }
        
        .clothing-name {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }
        
        .clothing-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
        }
        
        .clothing-rarity {
            padding: 0.15rem 0.4rem;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .clothing-rarity.common { background: var(--common); color: #000; }
        .clothing-rarity.rare { background: var(--rare); }
        .clothing-rarity.epic { background: var(--epic); }
        .clothing-rarity.legendary { background: var(--legendary); }
        
        .clothing-trend {
            color: var(--accent-green);
            font-weight: 600;
        }
        
        /* 穿戴动画 */
        @keyframes equipPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .clothing-card.equipping {
            animation: equipPulse 0.3s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .alliances {
                flex-wrap: wrap;
            }
            
            .outfit-agent {
                flex-direction: column;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            /* (装扮) 移动端布局 */
            .outfit-system {
                grid-template-columns: 1fr;
            }
            
            .clothing-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }
    </style>
</head>

        // 加载本地存储
        function loadState() {
            const saved = localStorage.getItem('agentFashionState');
            if (saved) {
                const parsedState = JSON.parse(saved);
                state = { ...state, ...parsedState };
                
                // 恢复装扮系统状态
                if (parsedState.equipped) {
                    state.equipped = { ...state.equipped, ...parsedState.equipped };
                }
                if (parsedState.ownedOutfits) {
                    state.ownedOutfits = parsedState.ownedOutfits;
                }
                // 恢复收藏状态
                if (parsedState.favorites) {
                    state.favorites = { ...state.favorites, ...parsedState.favorites };
                }
                // 恢复搜索历史
                if (parsedState.searchHistory) {
                    state.searchHistory = parsedState.searchHistory;
                }
                // 恢复浏览记录（从数组转为Set）
                if (parsedState.browsedItems && Array.isArray(parsedState.browsedItems)) {
                    state.browsedItems = new Set(parsedState.browsedItems);
                } else if (!parsedState.browsedItems) {
                    state.browsedItems = new Set();
                }
                // 确保成就相关字段存在
                if (!state.completedAchievements) state.completedAchievements = [];
                if (!state.totalXp) state.totalXp = 0;
                if (!state.totalPurchases) state.totalPurchases = 0;

        // ==================== 工具函数 ====================
        
        /** 防抖函数 */
        function debounce(fn, delay) {
            let timer = null;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }
        
        /** HTML转义防XSS */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        /** 搜索关键词高亮 */
        function highlightText(text, keyword) {
            if (!keyword || !keyword.trim()) return escapeHtml(text);
            const escaped = escapeHtml(keyword);
            const escapedForRegex = escaped.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedForRegex})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark class="search-highlight">$1</mark>');
        }
        
        /** 数字动画 */
        function animateNumber(el, target, duration = 400) {
            const start = parseInt(el.textContent) || 0;
            const startTime = performance.now();
            function update(now) {
                const p = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(start + (target - start) * ease);
                if (p < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        /** 从收藏快速购买 */
        function claimFromFav(type, id) {
            let items, ownedList;
            
            if (type === 'items') {
                items = products;
                ownedList = state.ownedItems;
            } else if (type === 'agents') {
                items = agents;
                ownedList = state.ownedAgents;
            }
            
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            if (state.userPoints < item.price) {
                showNotification('积分不足！', 'error');
                return;
            }
            
            if (ownedList.includes(id)) {
                showNotification('已拥有该物品！', 'error');
                return;
            }
            
            state.userPoints -= item.price;
            ownedList.push(id);
            
            if (type === 'items') {
                state.equippedItems.push(id);
            }
            
            animateNumber(document.getElementById('userPoints'), state.userPoints, 600);
            saveState();
            renderProducts();
            renderFavoritesContent();
            updateFavoritesBadge();
            
            showModal(item);

        // ==================== 搜索历史与热门推荐 ====================
        
        /** 添加搜索历史 */
        function addSearchHistory(keyword) {
            if (!keyword || !keyword.trim()) return;
            
            const trimmed = keyword.trim();
            // 去重：新词替换旧记录
            state.searchHistory = state.searchHistory.filter(h => h !== trimmed);
            state.searchHistory.unshift(trimmed);
            // 最多保存10条
            state.searchHistory = state.searchHistory.slice(0, 10);
            
            saveState();
        }
        
        /** 删除单条搜索历史 */
        function deleteSearchHistory(keyword) {
            state.searchHistory = state.searchHistory.filter(h => h !== keyword);
            saveState();
            renderSearchSuggestions();
        }
        
        /** 清空搜索历史 */
        function clearSearchHistory() {
            state.searchHistory = [];
            saveState();
            renderSearchSuggestions();
        }
        
        /** 生成热门搜索词 */
        function getHotKeywords() {
            const allNames = [
                ...products.map(p => p.name),
                ...agents.map(a => a.name),
                ...outfitItems.map(o => o.name)
            ];
            
            // 随机选取8个不重复的词
            const shuffled = allNames.sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 8);
        }

        function renderSearchSuggestions() {

            const historySection = document.getElementById('historySection');

            const hotItems = document.getElementById('hotItems');
            
            // 搜索历史
            if (state.searchHistory.length > 0) {

                historyItems.innerHTML = state.searchHistory.map(keyword => `

                    </div>

            // 热门推荐

        }
        
        function handleCardTilt(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // 计算倾斜角度（限制在 ±15 度）
            const rotateX = (y - centerY) / centerY * -15;
            const rotateY = (x - centerX) / centerX * 15;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px) scale(1.02)`;
        }
        
        function resetCardTilt(card) {
            card.style.transform = '';
        }
        
        // ==================== 粒子反馈效果 ====================
        
        function createParticles(e, rarity) {
            const colors = {
                common: ['#9ca3af', '#d1d5db', '#e5e7eb'],
                rare: ['#3b82f6', '#60a5fa', '#93c5fd'],
                epic: ['#a855f7', '#c084fc', '#d8b4fe'],
                legendary: ['#f59e0b', '#fbbf24', '#fcd34d', '#ff6b6b']
            };
            
            const particleColors = colors[rarity] || colors.common;
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || (rect.top + rect.height / 2);
            
            // 创建 12-20 个粒子
            const particleCount = 12 + Math.floor(Math.random() * 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = 4 + Math.random() * 8;
                const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.5;
                const distance = 50 + Math.random() * 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 20; // 稍微向上偏移
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${particleColors[Math.floor(Math.random() * particleColors.length)]};
                    left: ${x}px;
                    top: ${y}px;
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    box-shadow: 0 0 ${size}px ${particleColors[0]};
                `;
                
                particleContainer.appendChild(particle);
                
                // 动画结束后移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
        }
        
        function getRarityBg(rarity) {
            const bgs = {
                common: 'linear-gradient(135deg, #374151 0%, #1f2937 100%)',
                rare: 'linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%)',
                epic: 'linear-gradient(135deg, #581c87 0%, #3b0764 100%)',
                legendary: 'linear-gradient(135deg, #78350f 0%, #451a03 100%)'
            };
            return bgs[rarity];
        }

            return state.ownedItems.includes(id) || state.ownedAgents.includes(id);
        }

        // ==================== (装扮) 装扮系统功能 ====================
        
        /**
         * 切换部位标签
         * @param {string} slot - 部位标识
         */
        function switchSlot(slot) {

            // 更新标签高亮

        function renderClothingGrid() {

        /**
         * 获取稀有度中文文本
         * @param {string} rarity - 稀有度标识
         * @returns {string} 中文文本
         */
        function getRarityText(rarity) {
            const texts = {
                common: '普通',
                rare: '稀有',
                epic: '史诗',
                legendary: '传奇'
            };
            return texts[rarity] || rarity;
        }
        
        /**
         * 穿戴/卸下服装
         * @param {number} itemId - 服装ID
         */
        function toggleEquip(itemId) {
            const item = outfitItems.find(i => i.id === itemId);
            if (!item) return;
            
            const card = event.currentTarget;
            
            // 如果已拥有则可以穿戴/卸下
            if (!state.ownedOutfits.includes(itemId)) {
                // 先购买
                if (state.userPoints >= item.price) {
                    state.userPoints -= item.price;
                    state.ownedOutfits.push(itemId);
                    animateNumber(document.getElementById('userPoints'), state.userPoints, 400);
                    showNotification(`购买 ${item.name} 成功！`, 'success');
                } else {
                    showNotification('积分不足！', 'error');
                    return;
                }
            }
            
            // 如果已穿戴则卸下，否则穿戴
            if (state.equipped[item.slot] === itemId) {
                // 卸下
                state.equipped[item.slot] = null;
                showNotification(`卸下 ${item.name}`, 'success');
            } else {
                // 穿戴
                state.equipped[item.slot] = itemId;
                card.classList.add('equipping');
                setTimeout(() => card.classList.remove('equipping'), 300);
                showNotification(`穿戴 ${item.name}！`, 'success');
                // 成就追踪：检查装备成就
                checkAchievements();
            }
            
            saveState();
            updateCharacterDisplay();
            updateTrendDisplay();
            updateSlotTabs();
            renderClothingGrid();
        }
        
        /**
         * 更新角色形象显示
         */
        function updateCharacterDisplay() {
            const container = document.getElementById('characterContainer');
            
            // 清除旧的服装图层
            container.querySelectorAll('.clothing-layer').forEach(el => el.remove());
            
            // 按层级顺序添加服装
            const sortedItems = outfitItems
                .filter(item => state.equipped[item.slot] === item.id)
                .sort((a, b) => a.layer - b.layer);
            
            sortedItems.forEach(item => {
                const layer = document.createElement('div');
                layer.className = `clothing-layer layer-${item.slot}`;
                layer.textContent = item.icon;
                layer.style.zIndex = item.layer;
                container.appendChild(layer);
            });
        }
        
        /**
         * 更新潮流度显示
         */
        function updateTrendDisplay() {
            let totalTrend = 0;
            let equippedCount = 0;
            
            Object.keys(state.equipped).forEach(slot => {
                if (state.equipped[slot]) {
                    const item = outfitItems.find(i => i.id === state.equipped[slot]);
                    if (item) {
                        totalTrend += item.trendPoints;
                        equippedCount++;
                    }
                }
            });
            
            // 最大潮流度估算 (假设6个部位都穿传奇装备)
            const maxTrend = 600;
            const percent = Math.min((totalTrend / maxTrend) * 100, 100);
            
            // 更新显示
            animateNumber(document.getElementById('trendValue'), totalTrend, 500);
            document.getElementById('trendBar').style.width = percent + '%';
            document.getElementById('equippedCount').textContent = equippedCount;
            document.getElementById('trendPercent').textContent = Math.round(percent) + '%';
        }
        
        /**
         * 更新部位标签的已穿戴状态
         */
        function updateSlotTabs() {
            document.querySelectorAll('.slot-tab').forEach(tab => {
                const slot = tab.dataset.slot;
                tab.classList.toggle('equipped', state.equipped[slot] !== null);
            });
        }
        
        /**
         * 保存当前搭配方案
         */
        function saveOutfit() {
            const name = prompt('请输入方案名称：', '我的潮流穿搭');
            if (!name) return;
            
            const outfit = {
                id: Date.now().toString(),
                name: name,
                createdAt: Date.now(),
                equipped: { ...state.equipped },
                totalTrend: calculateTotalTrend()
            };
            
            // 获取已保存的方案
            let savedOutfits = JSON.parse(localStorage.getItem('agentOutfits') || '[]');
            savedOutfits.push(outfit);
            localStorage.setItem('agentOutfits', JSON.stringify(savedOutfits));
            
            showNotification(`方案 "${name}" 保存成功！`, 'success');
        }
        
        /**
         * 计算总潮流度
         * @returns {number} 总潮流度
         */
        function calculateTotalTrend() {
            let total = 0;
            Object.values(state.equipped).forEach(itemId => {
                if (itemId) {
                    const item = outfitItems.find(i => i.id === itemId);
                    if (item) total += item.trendPoints;
                }
            });
            return total;
        }
        
        /**
         * 重置穿戴
         */
        function resetOutfit() {
            if (!confirm('确定要重置所有穿戴吗？')) return;
            
            state.equipped = {
                hair: null,
                top: null,
                bottom: null,
                shoes: null,
                accessory: null,
                expression: null
            };
            
            saveState();
            updateCharacterDisplay();
            updateTrendDisplay();
            updateSlotTabs();
            renderClothingGrid();
            
            showNotification('已重置所有穿戴', 'success');
        }
        
        // ==================== 交互逻辑 ====================
        
        function claimItem(id, type) {
            const items = type === 'items' ? products : agents;
            const item = items.find(i => i.id === id);
            
            if (!item || state.userPoints < item.price) {
                showNotification('积分不足！', 'error');
                return;
            }
            
            if (isOwned(id)) {
                showNotification('已拥有该物品！', 'error');
                return;
            }
            
            state.userPoints -= item.price;
            
            // 成就追踪：累计购买次数和消费积分
            state.totalPurchases++;
            state.totalSpent += item.price;
            
            if (type === 'items') {
                state.ownedItems.push(id);
                state.equippedItems.push(id);
            } else {
                state.ownedAgents.push(id);
            }
            
            // 检查购买成就
            checkAchievements();
            
            // 积分消耗动画
            const pointsEl = document.getElementById('userPoints');
            animateNumber(pointsEl, state.userPoints, 600);
            
            saveState();
            renderProducts();
            renderOutfit();
            
            showModal(item);
        }
        
        function updateUI() {
            document.getElementById('userPoints').textContent = state.userPoints;
            renderProducts();
            renderOutfit();
            updateFavoritesBadge();
            updateLevelDisplay();
            updateAchievementBadge();
            
            // (装扮) 初始化装扮系统
            if (state.currentTab === 'customize') {
                document.getElementById('outfitSystem').style.display = 'grid';
                updateCharacterDisplay();
                updateTrendDisplay();
                updateSlotTabs();
                renderClothingGrid();
            }
            
            // 初始化时检查新手成就
            if (state.totalXp === 0 && state.completedAchievements.length === 0) {
                setTimeout(() => checkAchievements(), 500);
            }
        }
        
        // ==================== 成就系统函数 ====================
        
        /** 获取当前等级信息 */
        function getCurrentLevel() {
            for (let i = LEVEL_CONFIG.length - 1; i >= 0; i--) {
                if (state.totalXp >= LEVEL_CONFIG[i].minXp) {
                    return LEVEL_CONFIG[i];
                }
            }
            return LEVEL_CONFIG[0];
        }
        
        /** 获取当前等级配置 */
        function getLevelConfig(level) {
            return LEVEL_CONFIG[Math.min(level - 1, LEVEL_CONFIG.length - 1)];
        }
        
        /** 计算当前XP在等级内的进度百分比 */
        function getLevelProgress() {
            const level = getCurrentLevel();
            const xpInLevel = state.totalXp - level.minXp;
            const xpNeeded = level.maxXp - level.minXp;
            return Math.min((xpInLevel / xpNeeded) * 100, 100);
        }
        
        /** 更新等级显示 */
        function updateLevelDisplay() {
            const level = getCurrentLevel();
            const progress = getLevelProgress();
            const xpInLevel = state.totalXp - level.minXp;
            
            document.getElementById('levelTitle').textContent = `Lv.${level.level}`;
            document.getElementById('levelXp').textContent = `${xpInLevel} / ${level.maxXp - level.minXp} XP`;
            document.getElementById('levelBarFill').style.width = `${progress}%`;
        }
        
        /** 更新成就徽章 */
        function updateAchievementBadge() {
            const badge = document.getElementById('achBadge');
            const btn = document.getElementById('achBtn');
            
            if (state.newAchievements && state.newAchievements.length > 0) {
                badge.textContent = state.newAchievements.length;
                btn.classList.add('has-new');
            } else {
                badge.textContent = '0';
                btn.classList.remove('has-new');
            }
        }
        
        /** 检查所有成就 */
        function checkAchievements() {
            const newCompleted = [];
            
            ACHIEVEMENTS.forEach(ach => {
                // 跳过已完成的成就
                if (state.completedAchievements.includes(ach.id)) return;
                
                // 检查条件是否满足
                if (ach.condition(state)) {
                    newCompleted.push(ach);
                }
            });
            
            // 处理新完成的成就
            if (newCompleted.length > 0) {
                // 添加到已完成列表
                newCompleted.forEach(ach => {
                    state.completedAchievements.push(ach.id);
                    state.totalXp += ach.reward;
                    state.newAchievements.push(ach.id);
                });
                
                saveState();
                
                // 显示成就达成动画（逐个显示）
                showNextAchievement(newCompleted, 0);
                
                // 检查等级提升
                checkLevelUp();
            }
        }
        
        /** 逐个显示成就达成动画 */
        function showNextAchievement(achievements, index) {
            if (index >= achievements.length) {
                // 所有成就都显示了，更新UI
                updateLevelDisplay();
                updateAchievementBadge();
                return;
            }
            
            const ach = achievements[index];
            const prevLevel = getLevelConfig(getCurrentLevel().level);
            
            // 显示成就解锁动画
            document.getElementById('unlockIcon').textContent = ach.icon;
            document.getElementById('unlockName').textContent = ach.name;
            document.getElementById('unlockDesc').textContent = ach.desc;
            document.getElementById('unlockReward').textContent = `+${ach.reward} XP`;
            document.getElementById('achUnlockOverlay').classList.add('show');
            
            // 3秒后自动显示下一个或关闭
            setTimeout(() => {
                document.getElementById('achUnlockOverlay').classList.remove('show');
                setTimeout(() => {
                    showNextAchievement(achievements, index + 1);
                }, 300);
            }, 2500);
        }
        
        /** 关闭成就解锁动画 */
        function dismissAchievementUnlock() {
            document.getElementById('achUnlockOverlay').classList.remove('show');
        }
        
        /** 检查等级提升 */
        function checkLevelUp() {
            const currentLevel = getCurrentLevel();
            
            // 重新计算当前等级
            const newLevel = getCurrentLevel();
            
            if (newLevel.level > currentLevel.level) {
                // 显示等级提升动画
                showLevelUp(newLevel);
            }
        }
        
        /** 显示等级提升动画 */
        function showLevelUp(level) {
            const levelEmojis = ['⭐', '🌟', '✨', '💫', '🌠', '👑'];
            const emoji = levelEmojis[Math.min(level.level - 1, levelEmojis.length - 1)];
            
            document.getElementById('levelUpBadge').textContent = emoji;
            document.getElementById('levelUpRank').textContent = level.rank;
            document.getElementById('levelUpName').textContent = level.name;
            document.getElementById('levelUpOverlay').classList.add('show');
            
            // 3.5秒后自动关闭
            setTimeout(() => {
                dismissLevelUp();
            }, 3500);
        }
        
        /** 关闭等级提升动画 */
        function dismissLevelUp() {
            document.getElementById('levelUpOverlay').classList.remove('show');
        }
        
        /** 切换成就面板 */
        function toggleAchievementPanel() {
            const panel = document.getElementById('achievementPanel');
            const overlay = document.getElementById('achOverlay');
            const btn = document.getElementById('achBtn');
            
            if (panel.classList.contains('show')) {
                closeAchievementPanel();
            } else {
                // 关闭收藏面板
                closeFavoritesPanel();
                
                // 清除新成就标记
                state.newAchievements = [];
                saveState();
                updateAchievementBadge();
                
                panel.classList.add('show');
                overlay.classList.add('show');
                btn.classList.add('active');
                renderAchievementPanel();
            }
        }
        
        function closeAchievementPanel() {
            const panel = document.getElementById('achievementPanel');
            const overlay = document.getElementById('achOverlay');
            const btn = document.getElementById('achBtn');
            
            panel.classList.remove('show');
            overlay.classList.remove('show');
            btn.classList.remove('active');
        }
        
        /** 切换成就标签 */
        function switchAchTab(tab) {
            state.currentAchTab = tab;
            
            document.querySelectorAll('.achievement-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            
            renderAchievementPanel();
        }
        
        /** 渲染成就面板 */
        function renderAchievementPanel() {
            const list = document.getElementById('achievementList');
            const level = getCurrentLevel();
            
            // 更新等级卡
            document.getElementById('achLevelBadge').textContent = level.level <= 6 ? ['⭐', '🌟', '✨', '💫', '🌠', '👑'][level.level - 1] : '👑';
            document.getElementById('achLevelRank').textContent = level.rank;
            document.getElementById('achLevelName').textContent = level.name;
            document.getElementById('achXpCurrent').textContent = state.totalXp;
            document.getElementById('achXpMax').textContent = level.maxXp;
            document.getElementById('achProgressFill').style.width = `${getLevelProgress()}%`;
            
            // 更新统计
            const completedCount = state.completedAchievements.length;
            const inProgressCount = ACHIEVEMENTS.filter(ach => {
                if (state.completedAchievements.includes(ach.id)) return false;
                return ach.getProgress(state) < ach.getTarget();
            }).length;
            
            document.getElementById('achTotalCount').textContent = completedCount;
            document.getElementById('achInProgressCount').textContent = inProgressCount;
            document.getElementById('achTotalXp').textContent = state.totalXp;
            
            // 筛选成就
            let filteredAchs = ACHIEVEMENTS;
            if (state.currentAchTab !== 'all') {
                filteredAchs = ACHIEVEMENTS.filter(ach => ach.category === state.currentAchTab);
            }
            
            // 按类别分组
            const categories = {
                beginner: '🌱 新手成就',
                active: '⚡ 活跃成就',
                consume: '💎 消费成就'
            };
            
            let html = '';
            
            if (state.currentAchTab === 'all') {
                // 按类别显示
                Object.keys(categories).forEach(cat => {
                    const catAchs = filteredAchs.filter(ach => ach.category === cat);
                    if (catAchs.length === 0) return;
                    
                    html += `<div class="achievement-category">
                        <div class="category-title">${categories[cat]}</div>`;
                    
                    catAchs.forEach(ach => {
                        html += renderAchievementCard(ach);
                    });
                    
                    html += '</div>';
                });
            } else {
                // 直接显示
                filteredAchs.forEach(ach => {
                    html += renderAchievementCard(ach);
                });
            }
            
            list.innerHTML = html || '<div class="fav-empty"><div class="fav-empty-icon">🎉</div><h4>该分类暂无成就</h4></div>';
        }
        
        /** 渲染单个成就卡片 */
        function renderAchievementCard(ach) {
            const isCompleted = state.completedAchievements.includes(ach.id);
            const progress = ach.getProgress(state);
            const target = ach.getTarget();
            const percent = Math.min((progress / target) * 100, 100);
            
            const statusClass = isCompleted ? 'completed' : (progress > 0 ? 'in-progress' : '');
            
            return `<div class="achievement-card ${statusClass}">
                <div class="achievement-icon">${ach.icon}</div>
                <div class="achievement-info">
                    <div class="achievement-name">${ach.name}</div>
                    <div class="achievement-desc">${ach.desc}</div>
                    <div class="achievement-progress">
                        <div class="achievement-progress-bar">
                            <div class="achievement-progress-fill" style="width: ${percent}%"></div>
                        </div>
                        <span class="achievement-progress-text">${progress}/${target}</span>
                    </div>
                </div>
                <div class="achievement-reward">+${ach.reward} XP</div>
            </div>`;
        }
        
        /** 添加浏览记录（用于浏览成就） */
        function addBrowseRecord(itemId) {
            if (!state.browsedItems) {
                state.browsedItems = new Set();
            }
            if (!state.browsedItems.has(itemId)) {
                state.browsedItems.add(itemId);
                checkAchievements();
            }
        }
        
        function showModal(item) {
            const modal = document.getElementById('modal');
            document.getElementById('modalIcon').textContent = item.icon;
            document.getElementById('modalTitle').textContent = `获得 ${item.name}！`;
            document.getElementById('modalText').textContent = `${item.rarity.toUpperCase()} 稀有度 - ${item.bonus}`;
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function showNotification(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.querySelector('.notification-text').textContent = text;
            notif.querySelector('.notification-icon').textContent = type === 'success' ? '✅' : '❌';
            notif.className = `notification ${type} show`;
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
        
        // ==================== 事件绑定 ====================
        
        // 联盟筛选
        document.querySelectorAll('.alliance-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.alliance-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentAlliance = btn.dataset.alliance;
                renderProducts();
            });
        });
        
        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentTab = btn.dataset.tab;
                
                // 控制内容显示
                const productsGrid = document.getElementById('productsGrid');
                const outfitSection = document.getElementById('outfitSection');
                const outfitSystem = document.getElementById('outfitSystem');
                
                if (state.currentTab === 'customize') {
                    productsGrid.style.display = 'none';
                    outfitSection.style.display = 'none';
                    outfitSystem.style.display = 'grid';
                    updateCharacterDisplay();
                    updateTrendDisplay();
                    updateSlotTabs();
                    renderClothingGrid();
                } else if (state.currentTab === 'outfit') {
                    productsGrid.style.display = 'none';
                    outfitSystem.style.display = 'none';
                    outfitSection.style.display = 'block';
                    renderOutfit();
                } else {
                    outfitSection.style.display = 'none';
                    outfitSystem.style.display = 'none';
                    productsGrid.style.display = 'grid';
                    renderProducts();
                }
            });
        });
        
        // 搜索栏
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const searchSuggestions = document.getElementById('searchSuggestions');
        
        const debouncedSearch = debounce((value) => {
            state.currentSearch = value;
            searchClear.style.display = value ? 'flex' : 'none';
            
            // 输入时隐藏建议面板
            if (value.trim()) {
                searchSuggestions.classList.remove('show');
            }
            
            if (state.currentTab !== 'customize') {
                renderProducts();
            }
        }, 250);
        
        searchInput.addEventListener('input', (e) => debouncedSearch(e.target.value));
        
        // 聚焦时显示建议
        searchInput.addEventListener('focus', () => {
            renderSearchSuggestions();
            if (state.searchHistory.length > 0 || true) {
                searchSuggestions.classList.add('show');
            }
        });
        
        // 键盘事件
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearSearch();
                searchSuggestions.classList.remove('show');
                searchInput.blur();
            } else if (e.key === 'Enter') {
                const value = searchInput.value.trim();
                if (value) {
                    addSearchHistory(value);
                    state.currentSearch = value;
                    searchSuggestions.classList.remove('show');
                    if (state.currentTab !== 'customize') {
                        renderProducts();
                    }
                }
            }
        });
        
        // 点击外部关闭建议
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchSuggestions.classList.remove('show');
            }
        });
        
        function clearSearch() {
            state.currentSearch = '';
            searchInput.value = '';
            searchClear.style.display = 'none';
            if (state.currentTab !== 'customize') {
                renderProducts();
            }
        }
        
        function clearAllFilters() {
            state.currentSearch = '';
            state.currentRarity = 'all';
            state.currentAlliance = 'all';
            searchInput.value = '';
            searchClear.style.display = 'none';
            document.querySelectorAll('.alliance-btn').forEach(b => b.classList.toggle('active', b.dataset.alliance === 'all'));
            document.querySelectorAll('.rarity-btn').forEach(b => b.classList.toggle('active', b.dataset.rarity === 'all'));
            renderProducts();
        }
        
        // 稀有度筛选
        document.querySelectorAll('.rarity-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentRarity = btn.dataset.rarity;
                if (state.currentTab !== 'customize') {
                    renderProducts();
                }
            });
        });
        
        // 骨架屏渲染
        function renderSkeletons() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = Array.from({ length: 6 }, () => `
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line" style="margin-bottom:1.5rem"></div>
                </div>`).join('');
        }
        
        // 初始化时显示骨架屏再加载
        renderSkeletons();
        loadState();
        
        // 恢复搜索框状态
        if (state.currentSearch) {
            document.getElementById('searchInput').value = state.currentSearch;
            document.getElementById('searchClear').style.display = 'flex';
        }
        
        // 背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        createParticles();
        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 潮流联盟 | Agent Fashion Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --text-primary: #ffffff;
            --text-secondary: #8892b0;
            
            --common: #9ca3af;
            --rare: #3b82f6;
            --epic: #a855f7;
            --legendary: #f59e0b;
            
            --accent-cyan: #00d4ff;
            --accent-pink: #ff006e;
            --accent-green: #00ff88;
            
            /* (装扮) 部位标签色 */
            --slot-hair: #ff69b4;
            --slot-top: #4fc3f7;
            --slot-bottom: #81c784;
            --slot-shoes: #ffb74d;
            --slot-accessory: #ba68c8;
            --slot-expression: #ff8a65;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景动效 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: float 20s infinite;
            opacity: 0.5;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-icon {
            font-size: 1.8rem;
        }
        
        .user-panel {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .points-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 212, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--accent-cyan);
        }
        
        .points-icon {
            font-size: 1.2rem;
        }
        
        .points-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent-cyan);
            font-size: 1.1rem;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid var(--accent-cyan);
        }
        
        /* 主内容 */
        main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 4rem;
        }
        
        /* 英雄区 */
        .hero {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }
        
        .hero-badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid var(--epic);
            color: var(--epic);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        /* 联盟选择 */
        .alliances {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .alliance-btn {
            padding: 0.8rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .alliance-btn:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .alliance-btn.active {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border: none;
        }
        
        /* 搜索栏 */
        .search-bar {
            display: flex;
            align-items: center;
            max-width: 500px;
            margin: 2rem auto 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            transition: border-color 0.3s;
        }
        .search-bar:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }
        .search-icon { margin-right: 0.5rem; opacity: 0.6; }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .search-input::placeholder { color: var(--text-secondary); }
        .search-clear {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 24px; height: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .search-clear:hover { background: rgba(255,255,255,0.2); }
        
        /* 稀有度筛选 */
        .rarity-filter {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .rarity-btn {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
        }
        .rarity-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
        .rarity-btn.active { background: rgba(0,212,255,0.15); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .rarity-btn[data-rarity="legendary"].active { background: rgba(245,158,11,0.15); border-color: var(--legendary); color: var(--legendary); }
        .rarity-btn[data-rarity="epic"].active { background: rgba(168,85,247,0.15); border-color: var(--epic); color: var(--epic); }
        .rarity-btn[data-rarity="rare"].active { background: rgba(59,130,246,0.15); border-color: var(--rare); color: var(--rare); }
        .rarity-btn[data-rarity="common"].active { background: rgba(156,163,175,0.15); border-color: var(--common); color: var(--common); }

        /* 标签页 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }
        
        .tab-btn {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            transition: width 0.3s;
        }
        
        .tab-btn:hover {
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            color: var(--accent-cyan);
        }
        
        .tab-btn.active::after {
            width: 100%;
        }
        
        /* 产品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        /* 骨架屏 */
        .skeleton-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .skeleton-img {
            height: 200px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line {
            height: 14px;
            margin: 0.8rem 1.5rem;
            border-radius: 7px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* 搜索高亮 */
        .search-highlight {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-cyan);
            border-radius: 3px;
            padding: 0 2px;
        }
        
        /* 产品卡片入场动画 */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* 产品卡片 */
        .product-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .product-card.common::before { background: var(--common); }
        .product-card.rare::before { background: var(--rare); }
        .product-card.epic::before { background: var(--epic); }
        .product-card.legendary::before { background: linear-gradient(90deg, var(--legendary), #ff6b6b, var(--legendary)); }
        
        .product-image {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }
        
        .product-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }
        
        .rarity-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 1;
        }
        
        .rarity-badge.common { background: var(--common); color: #000; }
        .rarity-badge.rare { background: var(--rare); }
        .rarity-badge.epic { background: var(--epic); }
        .rarity-badge.legendary { background: linear-gradient(135deg, var(--legendary), #ff6b6b); }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .product-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .tag {
            padding: 0.2rem 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .price {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .price-icon {
            font-size: 1rem;
        }
        
        .price-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        
        .claim-btn {
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 90px;
        }
        
        .claim-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .claim-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: var(--text-secondary);
        }
        
        /* 领取脉冲动画 */
        @keyframes claimPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); }
            100% { transform: scale(1); }
        }
        .claim-btn.pulsing { animation: claimPulse 0.4s ease; }
        
        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .empty-state p { font-size: 0.9rem; }
        
        /* 穿搭展示区 */
        .outfit-showcase {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            margin-top: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .outfit-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .outfit-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .outfit-agent {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        
        .agent-display {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            position: relative;
            border: 3px solid var(--accent-cyan);
        }
        
        .agent-display::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 212, 255, 0.3);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .equipped-items {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .equipped-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid;
        }
        
        .equipped-item.common { border-color: var(--common); }
        .equipped-item.rare { border-color: var(--rare); }
        .equipped-item.epic { border-color: var(--epic); }
        .equipped-item.legendary { border-color: var(--legendary); }
        
        .equipped-icon {
            font-size: 1.5rem;
        }
        
        .equipped-name {
            font-weight: 600;
        }
        
        .equipped-bonus {
            font-size: 0.85rem;
            color: var(--accent-green);
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .modal h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .modal-btn {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        
        /* 通知 */
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 300;
            border: 1px solid;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            border-color: var(--accent-green);
        }
        
        .notification.error {
            border-color: var(--accent-pink);
        }
        
        .notification-icon {
            font-size: 1.5rem;
        }
        
        /* (装扮) ==================== 装扮系统样式 ==================== */
        
        /* 装扮系统主容器 */
        .outfit-system {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            margin-top: 2rem;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* 角色展示区 */
        .character-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        
        /* 角色形象容器 - 多层叠加 */
        .character-container {
            position: relative;
            width: 220px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 基础 Agent 形象 */
        .character-base {
            position: absolute;
            width: 180px;
            height: 240px;
            background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
            border-radius: 90px 90px 60px 60px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 3px solid rgba(0, 212, 255, 0.3);
        }
        
        /* 服装图层基础样式 */
        .clothing-layer {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        /* 发型层 */
        .layer-hair {
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 2.5rem;
        }
        
        /* 上装层 */
        .layer-top {
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            font-size: 3rem;
        }
        
        /* 下装层 */
        .layer-bottom {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 2.5rem;
        }
        
        /* 鞋子层 */
        .layer-shoes {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            font-size: 2rem;
        }
        
        /* 配饰层 */
        .layer-accessory {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            font-size: 2rem;
        }
        
        /* 表情层 */
        .layer-expression {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);

        /** 防抖函数 */
        function debounce(fn, delay) {
            let timer = null;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }
        
        /** 搜索关键词高亮 */
        function highlightText(text, keyword) {
            if (!keyword || !keyword.trim()) return text;
            const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<mark class="search-highlight">$1</mark>');
        }
        
        /** 数字动画 */
        function animateNumber(el, target, duration = 400) {
            const start = parseInt(el.textContent) || 0;
            const startTime = performance.now();
            function update(now) {
                const p = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(start + (target - start) * ease);
                if (p < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        /**
         * 穿戴/卸下服装
         * @param {number} itemId - 服装ID
         */
        function toggleEquip(itemId) {
            const item = outfitItems.find(i => i.id === itemId);
            if (!item) return;
            
            const card = event.currentTarget;
            
            // 如果已拥有则可以穿戴/卸下
            if (!state.ownedOutfits.includes(itemId)) {
                // 先购买
                if (state.userPoints >= item.price) {
                    state.userPoints -= item.price;
                    state.ownedOutfits.push(itemId);
                    animateNumber(document.getElementById('userPoints'), state.userPoints, 400);
                    showNotification(`购买 ${item.name} 成功！`, 'success');
                } else {
                    showNotification('积分不足！', 'error');
                    return;
                }
            }
            
            // 如果已穿戴则卸下，否则穿戴
            if (state.equipped[item.slot] === itemId) {
                // 卸下
                state.equipped[item.slot] = null;
                showNotification(`卸下 ${item.name}`, 'success');
            } else {
                // 穿戴
                state.equipped[item.slot] = itemId;
                card.classList.add('equipping');
                setTimeout(() => card.classList.remove('equipping'), 300);
                showNotification(`穿戴 ${item.name}！`, 'success');
            }
            
            saveState();
            updateCharacterDisplay();
            updateTrendDisplay();
            updateSlotTabs();
            renderClothingGrid();
        }

            sortedItems.forEach(item => {
                const layer = document.createElement('div');
                layer.className = `clothing-layer layer-${item.slot}`;

            let totalTrend = 0;
            let equippedCount = 0;
            
            Object.keys(state.equipped).forEach(slot => {
                if (state.equipped[slot]) {
                    const item = outfitItems.find(i => i.id === state.equipped[slot]);
                    if (item) {
                        totalTrend += item.trendPoints;
                        equippedCount++;
                    }
                }
            });
            
            // 最大潮流度估算 (假设6个部位都穿传奇装备)
            const maxTrend = 600;
            const percent = Math.min((totalTrend / maxTrend) * 100, 100);
            
            // 更新显示
            animateNumber(document.getElementById('trendValue'), totalTrend, 500);
            document.getElementById('trendBar').style.width = percent + '%';
            document.getElementById('equippedCount').textContent = equippedCount;
            document.getElementById('trendPercent').textContent = Math.round(percent) + '%';
        }

        /**
         * 计算总潮流度
         * @returns {number} 总潮流度
         */
        function calculateTotalTrend() {
            let total = 0;
            Object.values(state.equipped).forEach(itemId => {
                if (itemId) {
                    const item = outfitItems.find(i => i.id === itemId);
                    if (item) total += item.trendPoints;
                }
            });
            return total;
        }
        
        /**
         * 重置穿戴
         */
        function resetOutfit() {
            if (!confirm('确定要重置所有穿戴吗？')) return;
            
            state.equipped = {
                hair: null,
                top: null,
                bottom: null,
                shoes: null,
                accessory: null,
                expression: null
            };
            
            saveState();
            updateCharacterDisplay();
            updateTrendDisplay();
            updateSlotTabs();
            renderClothingGrid();
            
            showNotification('已重置所有穿戴', 'success');
        }
        
        // ==================== 交互逻辑 ====================
        
        function claimItem(id, type) {
            const items = type === 'items' ? products : agents;
            const item = items.find(i => i.id === id);
            
            if (!item || state.userPoints < item.price) {
                showNotification('积分不足！', 'error');
                return;
            }
            
            if (isOwned(id)) {
                showNotification('已拥有该物品！', 'error');
                return;
            }
            
            state.userPoints -= item.price;
            
            if (type === 'items') {
                state.ownedItems.push(id);
                state.equippedItems.push(id);
            } else {
                state.ownedAgents.push(id);
            }
            
            // 积分消耗动画
            const pointsEl = document.getElementById('userPoints');
            animateNumber(pointsEl, state.userPoints, 600);
            
            saveState();
            renderProducts();
            renderOutfit();
            
            showModal(item);
        }
        
        function updateUI() {
            document.getElementById('userPoints').textContent = state.userPoints;
            renderProducts();
            renderOutfit();
            
            // (装扮) 初始化装扮系统
            if (state.currentTab === 'customize') {
                document.getElementById('outfitSystem').style.display = 'grid';
                updateCharacterDisplay();
                updateTrendDisplay();
                updateSlotTabs();
                renderClothingGrid();
            }
        }
        
        function showModal(item) {
            const modal = document.getElementById('modal');
            document.getElementById('modalIcon').textContent = item.icon;
            document.getElementById('modalTitle').textContent = `获得 ${item.name}！`;
            document.getElementById('modalText').textContent = `${item.rarity.toUpperCase()} 稀有度 - ${item.bonus}`;
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function showNotification(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.querySelector('.notification-text').textContent = text;
            notif.querySelector('.notification-icon').textContent = type === 'success' ? '✅' : '❌';
            notif.className = `notification ${type} show`;
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
        
        // ==================== 事件绑定 ====================
        
        // 联盟筛选
        document.querySelectorAll('.alliance-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.alliance-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentAlliance = btn.dataset.alliance;
                renderProducts();
            });
        });
        
        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentTab = btn.dataset.tab;
                
                // 控制内容显示
                const productsGrid = document.getElementById('productsGrid');
                const outfitSection = document.getElementById('outfitSection');
                const outfitSystem = document.getElementById('outfitSystem');
                
                if (state.currentTab === 'customize') {
                    productsGrid.style.display = 'none';
                    outfitSection.style.display = 'none';
                    outfitSystem.style.display = 'grid';
                    updateCharacterDisplay();
                    updateTrendDisplay();
                    updateSlotTabs();
                    renderClothingGrid();
                } else if (state.currentTab === 'outfit') {
                    productsGrid.style.display = 'none';
                    outfitSystem.style.display = 'none';
                    outfitSection.style.display = 'block';
                    renderOutfit();
                } else {
                    outfitSection.style.display = 'none';
                    outfitSystem.style.display = 'none';
                    productsGrid.style.display = 'grid';
                    renderProducts();
                }
            });
        });
        
        // 搜索栏
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const debouncedSearch = debounce((value) => {
            state.currentSearch = value;
            searchClear.style.display = value ? 'flex' : 'none';
            if (state.currentTab !== 'customize') {
                renderProducts();
            }
        }, 250);
        searchInput.addEventListener('input', (e) => debouncedSearch(e.target.value));
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') clearSearch(); });
        
        function clearSearch() {
            state.currentSearch = '';
            searchInput.value = '';
            searchClear.style.display = 'none';
            renderProducts();
        }
        
        function clearAllFilters() {
            state.currentSearch = '';
            state.currentRarity = 'all';
            state.currentAlliance = 'all';
            searchInput.value = '';
            searchClear.style.display = 'none';
            document.querySelectorAll('.alliance-btn').forEach(b => b.classList.toggle('active', b.dataset.alliance === 'all'));
            document.querySelectorAll('.rarity-btn').forEach(b => b.classList.toggle('active', b.dataset.rarity === 'all'));
            renderProducts();
        }
        
        // 稀有度筛选
        document.querySelectorAll('.rarity-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentRarity = btn.dataset.rarity;
                if (state.currentTab !== 'customize') {
                    renderProducts();
                }
            });
        });
        
        // 骨架屏渲染
        function renderSkeletons() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = Array.from({ length: 6 }, () => `
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line" style="margin-bottom:1.5rem"></div>
                </div>`).join('');
        }
        
        // 初始化时显示骨架屏再加载
        renderSkeletons();
        loadState();
        
        // 恢复搜索框状态
        if (state.currentSearch) {
            document.getElementById('searchInput').value = state.currentSearch;
            document.getElementById('searchClear').style.display = 'flex';
        }
        
        // 背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        createParticles();
        updateUI();
    </script>
</body>
</html>
